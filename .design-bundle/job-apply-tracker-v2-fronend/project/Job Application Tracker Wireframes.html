<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Job Application Tracker — Wireframes</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;550;600;650;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="app" id="app">

  <!-- ===================== SIDEBAR ===================== -->
  <aside class="sidebar">
    <div class="brand">
      <div class="logo">A</div>
      <div class="wordmark">Applywell</div>
    </div>

    <nav class="nav" id="nav">
      <div class="nav-section">Workspace</div>
      <div class="nav-item active" data-screen="dashboard">
        <span class="ico">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><rect x="0.5" y="0.5" width="6" height="6" rx="1" stroke="currentColor"/><rect x="8.5" y="0.5" width="6" height="6" rx="1" stroke="currentColor"/><rect x="0.5" y="8.5" width="6" height="6" rx="1" stroke="currentColor"/><rect x="8.5" y="8.5" width="6" height="6" rx="1" stroke="currentColor"/></svg>
        </span>
        <span class="label">Dashboard</span>
      </div>
      <div class="nav-item" data-screen="applications">
        <span class="ico">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><rect x="0.5" y="1" width="3" height="3" rx="0.5" stroke="currentColor"/><rect x="0.5" y="6" width="3" height="3" rx="0.5" stroke="currentColor"/><rect x="0.5" y="11" width="3" height="3" rx="0.5" stroke="currentColor"/><line x1="6" y1="2.5" x2="14.5" y2="2.5" stroke="currentColor"/><line x1="6" y1="7.5" x2="14.5" y2="7.5" stroke="currentColor"/><line x1="6" y1="12.5" x2="14.5" y2="12.5" stroke="currentColor"/></svg>
        </span>
        <span class="label">Applications</span>
        <span class="badge-count">36</span>
      </div>
      <div class="nav-item" data-screen="metrics">
        <span class="ico">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><rect x="0.5" y="9" width="3.5" height="5.5" rx="0.5" stroke="currentColor"/><rect x="5.75" y="5" width="3.5" height="9.5" rx="0.5" stroke="currentColor"/><rect x="11" y="1.5" width="3.5" height="13" rx="0.5" stroke="currentColor"/></svg>
        </span>
        <span class="label">Metrics</span>
      </div>

      <div class="nav-section">System</div>
      <div class="nav-item" data-screen="devtools">
        <span class="ico mono" style="font-size:12px;font-weight:600;">&lt;/&gt;</span>
        <span class="label">Developer Tools</span>
      </div>
      <div class="nav-item" data-screen="settings">
        <span class="ico">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="7.5" cy="5" r="2.5" stroke="currentColor"/><path d="M2 13.5C2.5 10.7 4.7 9 7.5 9C10.3 9 12.5 10.7 13 13.5" stroke="currentColor" stroke-linecap="round"/></svg>
        </span>
        <span class="label">Account Settings</span>
      </div>
    </nav>

    <!-- XP / level -->
    <div class="xp" title="Level 7 — Persistent Hunter">
      <div class="xp-row">
        <div class="xp-avatar">JD</div>
        <div class="xp-meta">
          <div class="xp-level">Level 7</div>
          <div class="xp-rank">Persistent Hunter</div>
        </div>
      </div>
      <div class="xp-track"><div class="xp-fill" style="width:68%"></div></div>
      <div class="xp-num">1,360 / 2,000 XP · 640 to L8</div>
    </div>
  </aside>

  <!-- ===================== MAIN ===================== -->
  <div class="main">
    <header class="topbar">
      <button class="icon-btn" id="collapseBtn" title="Collapse sidebar">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><rect x="0.5" y="1.5" width="12" height="12" rx="1.5" stroke="currentColor"/><line x1="5" y1="1.5" x2="5" y2="13.5" stroke="currentColor"/></svg>
      </button>
      <div class="crumb"><span id="crumbRoot">Workspace</span> <span>/</span> <b id="crumbLeaf">Dashboard</b></div>
      <div class="topbar-right">
        <div class="wm-chip">WIREFRAME</div>
        <div class="topbar-search">
          <svg width="14" height="14" viewBox="0 0 15 15" fill="none"><circle cx="6.5" cy="6.5" r="5" stroke="currentColor"/><line x1="10.5" y1="10.5" x2="14" y2="14" stroke="currentColor" stroke-linecap="round"/></svg>
          <input placeholder="Search…" />
          <span class="kbd">⌘K</span>
        </div>
      </div>
    </header>

    <div class="content" id="content"><!-- screen renders here --></div>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
