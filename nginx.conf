server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location ~* ^/React-JobApplyTracker/assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~ ^/React-JobApplyTracker/(favicon\.svg|icons\.svg)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    location = /React-JobApplyTracker/manifest.webmanifest {
        default_type application/manifest+json;
        expires 30d;
        add_header Cache-Control "public";
    }

    location = /React-JobApplyTracker {
        return 301 /React-JobApplyTracker/$is_args$args;
    }

    location /React-JobApplyTracker/ {
        try_files $uri $uri/ /React-JobApplyTracker/index.html;
    }

    location = /React-JobApplyTracker/index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
