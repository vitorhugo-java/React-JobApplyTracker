server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Static assets - serve directly with long cache
    location ~* ^/React-JobApplyTracker/assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Public files (favicon, manifest, icons)
    location ~ ^/React-JobApplyTracker/(favicon\.svg|manifest\.webmanifest|icons\.svg)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # React app SPA routing
    location ~* ^/React-JobApplyTracker(?:/(.*))?$ {
        # Rewrite to serve from root
        rewrite ^/React-JobApplyTracker/(.*)$ /$1 break;
        rewrite ^/React-JobApplyTracker/?$ / break;
        
        # Try file, try directory, fallback to index.html for SPA
        try_files $uri /index.html;
    }

    # Index.html cache policy
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
