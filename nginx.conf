types {
    include /etc/nginx/mime.types;
    application/manifest+json webmanifest;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location ~* ^/React-JobApplyTracker/assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~ ^/React-JobApplyTracker/(favicon\.svg|manifest\.webmanifest|icons\.svg)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    location = /React-JobApplyTracker {
        return 301 /React-JobApplyTracker/;
    }

    location /React-JobApplyTracker/ {
        try_files $uri /React-JobApplyTracker/index.html;
    }

    location = /React-JobApplyTracker/index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
