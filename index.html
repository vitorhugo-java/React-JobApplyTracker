<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta -->
    <title>Applywell — Job Application Tracker</title>
    <meta name="description" content="Track your job applications, follow-ups, and interview stages all in one place. Stay organised during your job search with Applywell." />
    <meta name="application-name" content="Applywell" />
    <meta name="theme-color" content="#6366f1" />
    <meta name="color-scheme" content="dark light" />

    <!-- Icons and PWA -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icons.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Canonical -->
    <link rel="canonical" href="https://applywell.hugojava.dev/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://applywell.hugojava.dev/" />
    <meta property="og:site_name" content="Applywell" />
    <meta property="og:title" content="Applywell — Job Application Tracker" />
    <meta property="og:description" content="Track your job applications, follow-ups, and interview stages all in one place." />
    <meta property="og:image" content="https://applywell.hugojava.dev/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Applywell — Job Application Tracker" />
    <meta name="twitter:description" content="Track your job applications, follow-ups, and interview stages all in one place." />
    <meta name="twitter:image" content="https://applywell.hugojava.dev/og-image.png" />

    <!-- Search engine hints -->
    <meta name="robots" content="index, follow" />

    <!-- Preconnect for fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;550;600;650;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- Structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Applywell",
      "description": "Track your job applications, follow-ups, and interview stages all in one place.",
      "url": "https://applywell.hugojava.dev/",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "Job application tracking",
        "Interview stage management",
        "Recruiter follow-up reminders",
        "Application metrics and analytics",
        "Offline support"
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
