server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    types {
        application/manifest+json webmanifest;
    }

    location = / {
        return 301 /React-JobApplyTracker/;
    }

    location /React-JobApplyTracker/ {
        try_files $uri $uri/ /React-JobApplyTracker/index.html;
    }
}
