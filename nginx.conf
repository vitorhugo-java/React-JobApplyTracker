server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = /React-JobApplyTracker/site.webmanifest {
        default_type application/manifest+json;
    }

    location = / {
        return 301 /React-JobApplyTracker/;
    }

    location /React-JobApplyTracker/assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location = /React-JobApplyTracker/index.html {
        try_files $uri =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    location /React-JobApplyTracker/ {
        try_files $uri $uri/ /React-JobApplyTracker/index.html;
    }
}
