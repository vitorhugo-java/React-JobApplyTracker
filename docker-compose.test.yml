services:
  db:
    image: mariadb:10.11
    command: --innodb-use-native-aio=0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: jobtracker
      MYSQL_USER: jobtracker
      MYSQL_PASSWORD: jobtracker
    ports:
      - '3306:3306'
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-u", "$$MYSQL_USER", "--password=$$MYSQL_PASSWORD", "--protocol", "tcp"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/vitorhugo-java/jobapplytracker-backend:latest}
    restart: unless-stopped
    ports:
      - '8080:8080'
    container_name: job-tracker-app
    environment:
      SPRING_DATASOURCE_URL: jdbc:mariadb://db:3306/jobtracker
      SPRING_DATASOURCE_USERNAME: jobtracker
      SPRING_DATASOURCE_PASSWORD: jobtracker
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_PROFILES_ACTIVE: test
      JWT_SECRET: ${JWT_SECRET:-supersecretjwttokenforplaywright32chars!!}
      JWT_EXPIRATION_MS: '3600000'
      JWT_REFRESH_EXPIRATION_MS: '86400000'
      GOOGLE_DRIVE_CLIENT_ID: ${GOOGLE_DRIVE_CLIENT_ID:-google-drive-disabled-client}
      GOOGLE_DRIVE_CLIENT_SECRET: ${GOOGLE_DRIVE_CLIENT_SECRET:-google-drive-disabled-secret}
      GOOGLE_DRIVE_REDIRECT_URI: ${GOOGLE_DRIVE_REDIRECT_URI:-http://localhost:8080/api/v1/google-drive/oauth/callback}
      GOOGLE_DRIVE_OAUTH_COMPLETE_URL: ${GOOGLE_DRIVE_OAUTH_COMPLETE_URL:-http://localhost:5173/settings/google-drive/callback}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:8080/actuator/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
