name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        run: npm run build

      - name: Start backend services
        run: docker compose -f docker-compose.test.yml up -d
        env:
          BACKEND_IMAGE: ${{ vars.BACKEND_IMAGE || 'ghcr.io/vitorhugo-java/jobapplytracker-backend:latest' }}
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'supersecretjwttokenforplaywright32chars!!' }}

      - name: Wait for backend to be healthy
        run: |
          echo "Waiting for backend at http://localhost:8080/actuator/health ..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/actuator/health > /dev/null 2>&1; then
              echo "Backend is up!"
              break
            fi
            echo "Attempt $i/30 — retrying in 5s..."
            sleep 5
          done
          curl -sf http://localhost:8080/actuator/health || (echo "Backend failed to start" && docker compose -f docker-compose.test.yml logs && exit 1)

      - name: Run Playwright tests
        run: npx playwright test
        env:
          CI: true
          API_TARGET: http://localhost:8080

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Stop backend services
        if: always()
        run: docker compose -f docker-compose.test.yml down -v
