server {
    listen 80;
    server_name _;

    # Serve React app at sub-path with alias
    location /React-JobApplyTracker/ {
        alias /usr/share/nginx/html/;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Serve assets with long cache (universal path)
    location ~* /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Root location
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
